name: Android CI

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy dashboard HTML into assets
        run: |
          mkdir -p app/src/main/assets
          cp bitcoin-enhanced.html app/src/main/assets/bitcoin-enhanced.html

      - name: Create launcher icons (Python/Pillow)
        run: |
          pip install Pillow --quiet --break-system-packages
          echo "" | base64 -d > /tmp/make_icons.py
          python3 /tmp/make_icons.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-debug
          path: app/build/outputs/apk/debug/*.apk
