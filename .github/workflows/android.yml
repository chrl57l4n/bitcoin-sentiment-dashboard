name: Android CI

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Sign APK / AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy dashboard HTML into assets
        run: |
          mkdir -p app/src/main/assets
          cp bitcoin-enhanced.html app/src/main/assets/bitcoin-enhanced.html

      - name: Create launcher icons (Python/Pillow)
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 -c "
import os
from PIL import Image, ImageDraw
sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
for folder, size in sizes.items():
    out = 'app/src/main/res/' + folder
    os.makedirs(out, exist_ok=True)
    img = Image.new('RGBA', (size, size), (0,0,0,0))
    d = ImageDraw.Draw(img)
    d.ellipse([0,0,size-1,size-1], fill=(247,147,26,255))
    p = size//4
    d.ellipse([p,p,size-p-1,size-p-1], fill=(26,8,0,255))
    img.save(out+'/ic_launcher.png')
    img.save(out+'/ic_launcher_round.png')
    print('Created '+out+'/ic_launcher.png ('+str(size)+'x'+str(size)+')')
"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode keystore
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        if: github.event_name == 'push'
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Build release AAB (Play Store)
        if: github.event_name == 'push'
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release AAB
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
