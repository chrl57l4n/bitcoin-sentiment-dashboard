name: Android CI

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Sign APK / AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy dashboard HTML into assets
        run: |
          mkdir -p app/src/main/assets
          cp bitcoin-enhanced.html app/src/main/assets/bitcoin-enhanced.html

      - name: Create launcher icons (ImageMagick)
        run: |
          for ENTRY in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            FOLDER="${ENTRY%%:*}"
            SIZE="${ENTRY##*:}"
            DIR="app/src/main/res/$FOLDER"
            mkdir -p "$DIR"
            convert -size ${SIZE}x${SIZE} xc:none \
              -fill "#f7931a" \
              -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),1" \
              -fill "#1a0800" \
              -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),$((SIZE/5))" \
              "$DIR/ic_launcher.png"
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            echo "Icon ${SIZE}x${SIZE} -> $DIR"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode keystore
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        if: github.event_name == 'push'
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Build release AAB (Play Store)
        if: github.event_name == 'push'
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.KEY_PASS }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release AAB
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
